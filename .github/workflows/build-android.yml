name: Build Android (OSS debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove daemon JVM pin (CI has no JetBrains JBR)
        run: rm -f gradle/gradle-daemon-jvm.properties

      - name: Build OSS debug APK
        run: ./gradlew :app:assembleOssDebug -POAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orange-cloud-oss-debug
          path: apps/android/app/build/outputs/apk/oss/debug/*.apk
