name: Generate signing keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "证书别名，自己起一个，比如 orangecloud"
        required: true
        default: "orangecloud"
      store_password:
        description: "keystore 密码，自己定一个，记住它"
        required: true
      key_password:
        description: "key 密码，可以和上面一样，自己定一个，记住它"
        required: true

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ inputs.store_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=OrangeCloud, OU=Personal, O=Personal, L=Unknown, S=Unknown, C=CN"

      - name: Output base64 to job summary
        run: |
          echo '### 复制下面这一整段（不含反引号）作为 KEYSTORE_BASE64 这个 Secret 的值' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          base64 -w0 release.jks >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
